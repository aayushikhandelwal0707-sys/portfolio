<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Email Registration Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .form-container {
      background: #fff;
      border: 2px solid #333;
      padding: 20px;
      width: 400px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    h2 {
      text-align: center;
      color: #2c3e50;
    }
    label {
      font-weight: bold;
      margin-top: 10px;
      display: block;
    }
    input {
      width: 100%;
      padding: 8px;
      margin: 5px 0 15px;
      border: 1px solid #aaa;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #2980b9;
    }
    .output {
      margin-top: 20px;
      font-size: 15px;
      font-weight: bold;
      color: #2c3e50;
    }
    .error {
      color: red;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>📧 Email Registration</h2>
    <form id="registrationForm">
      <label for="name">Full Name:</label>
      <input type="text" id="name" placeholder="Enter your name" required>

      <label for="email">Email Address:</label>
      <input type="text" id="email" placeholder="Enter your email" required>

      <label for="password">Password:</label>
      <input type="password" id="password" placeholder="Enter password" required>

      <button type="submit">Register</button>
      <p class="error" id="error"></p>
    </form>

    <div class="output" id="output"></div>
  </div>

  <script>
    const form = document.getElementById("registrationForm");
    const errorMsg = document.getElementById("error");
    const outputDiv = document.getElementById("output");

    form.addEventListener("submit", function(event) {
      event.preventDefault(); // Prevent page reload

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      // Regular Expressions for validation
      const emailRegex = /^[a-zA-Z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$/;
      const passwordRegex = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{6,}$/; 
      // Password must be at least 6 characters, include letters and numbers

      // Validation checks
      if (!emailRegex.test(email)) {
        errorMsg.textContent = "Invalid email format!";
        return;
      }
      if (!passwordRegex.test(password)) {
        errorMsg.textContent = "Password must be at least 6 characters long and contain letters & numbers.";
        return;
      }

      // Clear error if valid
      errorMsg.textContent = "";

      // Display values back to user
      outputDiv.innerHTML = `
        ✅ Registration Successful! <br><br>
        <strong>Name:</strong> ${name} <br>
        <strong>Email:</strong> ${email} <br>
        <strong>Password:</strong> ${"*".repeat(password.length)}
      `;
    });
  </script>
</body>
</html>
